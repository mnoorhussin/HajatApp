<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/fav.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO -->
    <title>حاجات | أي حاجة... حاجات — توصيل طلباتك في السودان</title>
    <meta name="description" content="حاجات هو التطبيق الأول لتوصيل كل احتياجاتك في السودان. مطاعم، صيدليات، بقالات، أو أي مرسال، نحن في خدمتك." />
    <meta name="keywords" content="حاجات, توصيل, السودان, تطبيق توصيل, مطاعم, صيدلية, مرسال" />
    
    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    
    <!-- Performance: Preconnect to Font domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
